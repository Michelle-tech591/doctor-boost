name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        id: build
        run: |
          set -o pipefail
          bun run build 2>&1 | tee build.log

      - name: Verify font assets emitted
        run: |
          set -euo pipefail
          # Locate the built client assets directory (TanStack Start output)
          OUT_DIR=""
          for candidate in dist/client/assets .output/public/assets dist/assets .output/public/_build/assets; do
            if [ -d "$candidate" ]; then OUT_DIR="$candidate"; break; fi
          done
          if [ -z "$OUT_DIR" ]; then
            echo "❌ Could not find build output assets directory"
            find dist .output -maxdepth 4 -type d 2>/dev/null || true
            exit 1
          fi
          echo "Scanning $OUT_DIR for font files..."
          FONT_COUNT=$(find "$OUT_DIR" -type f \( -iname '*.woff2' -o -iname '*.woff' -o -iname '*.ttf' -o -iname '*.otf' \) | wc -l)
          echo "Found $FONT_COUNT font files"
          if [ "$FONT_COUNT" -eq 0 ]; then
            echo "❌ No font assets were emitted — @fontsource imports may be missing or unresolved"
            exit 1
          fi
          # Verify built CSS references at least one @font-face
          if ! grep -rlE '@font-face' "$OUT_DIR" >/dev/null; then
            echo "❌ No @font-face declarations found in built CSS"
            exit 1
          fi
          echo "✅ Font assets verified"


      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Post build errors to job summary
        if: failure()
        run: |
          {
            echo "## ❌ Build failed"
            echo ""
            echo "<details><summary>Full build output</summary>"
            echo ""
            echo '```'
            cat build.log
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment build errors on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('build.log', 'utf8');
            const MAX = 60000;
            const body = [
              '### ❌ Build failed',
              '',
              '<details><summary>Full build output</summary>',
              '',
              '```',
              log.length > MAX ? log.slice(-MAX) : log,
              '```',
              '',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        id: tests
        run: |
          set -o pipefail
          bun run test 2>&1 | tee test.log

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: test.log

      - name: Post test failures to job summary
        if: failure()
        run: |
          {
            echo "## ❌ Tests failed"
            echo ""
            echo "<details><summary>Full test output</summary>"
            echo ""
            echo '```'
            cat test.log
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment test failures on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('test.log', 'utf8');
            const MAX = 60000;
            const body = [
              '### ❌ Tests failed',
              '',
              '<details><summary>Full test output</summary>',
              '',
              '```',
              log.length > MAX ? log.slice(-MAX) : log,
              '```',
              '',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        id: build
        run: |
          set -o pipefail
          bun run build 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Post build errors to job summary
        if: failure()
        run: |
          {
            echo "## ❌ Build failed"
            echo ""
            echo "<details><summary>Full build output</summary>"
            echo ""
            echo '```'
            cat build.log
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment build errors on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('build.log', 'utf8');
            const MAX = 60000;
            const body = [
              '### ❌ Build failed',
              '',
              '<details><summary>Full build output</summary>',
              '',
              '```',
              log.length > MAX ? log.slice(-MAX) : log,
              '```',
              '',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
